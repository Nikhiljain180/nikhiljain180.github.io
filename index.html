<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <a href="#top" class="nav-logo" id="nav-logo" aria-label="Home">—</a>
        <ul class="nav-links" id="nav-list"></ul>
        <div class="nav-actions">
          <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <div class="theme-toggle-knob">
              <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg class="icon-sun" viewBox="0 0 24 24" style="display: none" aria-hidden="true" fill="none">
                <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" />
                <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" />
                <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" />
                <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" />
                <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" />
              </svg>
            </div>
          </button>
          <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main>
      <section class="hero" id="top">
        <div class="hero-content fade-in">
          <img src="" alt="" class="hero-photo" id="hero-photo" width="160" height="160" hidden />
          <div class="hero-badge" id="hero-badge"></div>
          <h1 id="hero-heading"></h1>
          <p class="hero-subtitle" id="hero-subtext"></p>
          <div class="hero-links">
            <a class="btn btn-primary" id="cta-primary" href="#projects">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                />
              </svg>
              <span id="cta-primary-label"></span>
            </a>
            <a class="btn btn-outline" id="cta-secondary" href="#contact">
              <span id="cta-secondary-label"></span>
            </a>
          </div>
        </div>
      </section>

      <section id="about">
        <div class="container">
          <div class="about-grid">
            <div class="about-text fade-in">
              <span class="section-label">About</span>
              <h2 class="section-title" id="about-lead-title"></h2>
              <div id="about-body"></div>
              <div class="tech-strip" id="skill-tags"></div>
            </div>
            <div class="about-highlights fade-in">
              <div id="highlight-grid"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="projects">
        <div class="container">
          <span class="section-label fade-in" id="projects-label"></span>
          <h2 class="section-title fade-in" id="projects-section-title"></h2>
          <p class="section-desc fade-in" id="projects-intro"></p>
          <div class="projects-grid" id="project-grid"></div>

          <div style="margin-top: 4rem" class="fade-in" id="writing-section">
            <span class="section-label" id="writing-label">Beyond the demo</span>
            <div id="writing-items"></div>
          </div>
        </div>
      </section>

      <section id="contact">
        <div class="container">
          <div class="contact-grid">
            <div class="contact-info fade-in">
              <span class="section-label">Contact</span>
              <h2 class="section-title" id="contact-title"></h2>
              <p id="contact-blurb"></p>
              <div class="resume-btn-wrapper" id="resume-wrapper" hidden>
                <a class="btn btn-primary" id="resume-btn" href="#" style="margin-top: 1rem">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    style="width: 16px; height: 16px"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                  </svg>
                  <span id="resume-btn-label">Download Resume</span>
                </a>
              </div>
            </div>
            <div class="contact-links-col fade-in">
              <div class="contact-links" id="contact-links"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-inner">
        <div class="footer-text" id="footer-copy"></div>
        <div class="footer-socials" id="footer-socials"></div>
      </div>
    </footer>

    <script src="profile-data.js"></script>
    <script src="main.js"></script>
    <script src="site.js"></script>
  </body>
</html>
